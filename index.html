<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel ShipSmart</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f4f7fb;
    text-align: center;
}

/* LOGO */
.header {
    padding: 30px;
}

.header img {
    width: 220px;
}

/* BOTÃO INICIO */
.home-btn {
    background: #1f4ea3;
    color: white;
    padding: 15px 40px;
    border-radius: 12px;
    display: inline-block;
    font-size: 20px;
    margin-bottom: 30px;
}

/* CARDS */
.container {
    display: flex;
    justify-content: center;
    gap: 20px;
    flex-wrap: wrap;
}

.card {
    background: white;
    width: 280px;
    padding: 20px;
    border-radius: 16px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
}

.card h2 {
    color: #1f4ea3;
}

.btn {
    margin-top: 15px;
    background: #1f4ea3;
    color: white;
    padding: 12px;
    border-radius: 10px;
    text-decoration: none;
    display: block;
}

/* PLANILHA */
.sheet {
    margin-top: 50px;
}

iframe {
    width: 90%;
    height: 400px;
    border-radius: 12px;
    border: none;
}

.open-btn {
    margin-top: 20px;
    background: #2ecc71;
    padding: 15px 30px;
    color: white;
    border-radius: 10px;
    text-decoration: none;
    display: inline-block;
}
</style>

</head>

<body>

<div class="header">
    <img src="https://shipsmart.global/wp-content/uploads/2026/03/shipsmart-logo-w.png">
</div>

<div class="home-btn">🏠 Início</div>

<div class="container">

    <div class="card">
        <h2>Torre de Controle</h2>
        <a class="btn" href="#">Acessar</a>
    </div>

    <div class="card">
        <h2>O Aruvio</h2>
        <a class="btn" href="#">Acessar</a>
    </div>

    <div class="card">
        <h2>Relatórios</h2>
        <a class="btn" href="#">Visualizar</a>
    </div>

</div>

<div class="sheet">
    <h2>Planilha do Aruvio</h2>

    <iframe src="https://docs.google.com/spreadsheets/d/1VBzvma7MiKHqPRst-i9VSpBAuTC3HNxAF-9pKU1-wpI/edit?gid=1406350545#gid=1406350545"></iframe>

    <br>

    <a class="open-btn" target="_blank"
    href="https://docs.google.com/spreadsheets/d/1VBzma7MiKHqPRst-i9VSpBAuTC3HNxAF-9pKU1-wpI/edit?gid=1406350545#gid=1406350545">
        Abrir Planilha
    </a>
</div>

</body>
</html>
